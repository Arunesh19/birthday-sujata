<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujata's Birthday Guestbook ✍️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #03020b, #010104);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .guestbook-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        .title-glow {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00e5ff, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 35px;
        }

        /* Glassmorphic Form input layout card */
        .input-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 35px;
            text-align: left;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .form-control:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
        }

        textarea.form-control {
            height: 100px;
            resize: none;
        }

        /* Responsive signature wall message feed container */
        .notes-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (min-width: 480px) {
            .notes-grid { grid-template-columns: 1fr 1fr; }
        }

        .note-item {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0;
            transform: translateY(15px);
            animation: noteAppear 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes noteAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .note-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 15px;
            word-break: break-word;
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed rgba(255, 255, 255, 0.08);
            padding-top: 10px;
        }

        .note-author {
            font-size: 0.8rem;
            font-weight: 600;
            color: #ff4081;
        }

        .note-time {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Core Global Action Layout Controls */
        .action-btn {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn {
            background: linear-gradient(45deg, #00e5ff, #2979ff);
            color: white;
            box-shadow: 0 10px 25px rgba(0, 229, 255, 0.2);
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            margin-top: 15px;
        }

        .action-btn:hover {
            transform: scale(1.01);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="guestbook-container">
        <h1 class="title-glow">The Digital Guestbook</h1>
        <p class="subtitle">Leave a surprise birthday signature or message for Sujata</p>

        <!-- Signature Entry Module block -->
        <div class="input-card">
            <div class="form-group">
                <label for="guestName">Your Name</label>
                <input type="text" id="guestName" class="form-control" placeholder="e.g., Arunesh" maxlength="30">
            </div>
            <div class="form-group">
                <label for="guestMessage">Wishes / Note</label>
                <textarea id="guestMessage" class="form-control" placeholder="Write something exceptional..." maxlength="300"></textarea>
            </div>
            <button class="action-btn submit-btn" onclick="addSignature(event)">
                Sign Guestbook ✨
            </button>
        </div>

        <!-- Real-time Live Message Wall Target Frame Container -->
        <div class="notes-grid" id="notesGrid"></div>

        <button class="action-btn nav-btn" onclick="proceedToFinale(event)">
            Proceed to Grand Finale →
        </button>
    </div>

    <script>
        /* Anti-Lag Thread State Config Pointers */
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId = null;
        let isTabActive = true;
        let driftNodes = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        /* Ambient floating micro particles framework */
        class DriftNode {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 1.1 + 0.3;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.vy = -(Math.random() * 0.3 + 0.1);
            }
            update() {
                this.y += this.vy;
                if (this.y < -10) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#00e5ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < 30; i++) {
            driftNodes.push(new DriftNode());
        }

        /* Throttling-Insulated Loop Execution Framework */
        function runGuestbookEngine() {
            if (!isTabActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let node of driftNodes) {
                node.update();
                node.draw();
            }
            animationFrameId = requestAnimationFrame(runGuestbookEngine);
        }
        runGuestbookEngine();

        /* Window state runtime focus observers */
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                isTabActive = true;
                runGuestbookEngine();
            }
        });

        /* Persistent Storage Data Hydration Operations Engine */
        const STORAGE_KEY = 'sujata_guestbook_notes';

        function loadSignatures() {
            const grid = document.getElementById('notesGrid');
            grid.innerHTML = '';
            
            const localData = localStorage.getItem(STORAGE_KEY);
            const notes = localData ? JSON.parse(localData) : getFallbackNotes();

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'note-item';
                card.innerHTML = `
                    <p class="note-text">${escapeHtml(note.message)}</p>
                    <div class="note-meta">
                        <span class="note-author">@${escapeHtml(note.name)}</span>
                        <span class="note-time">${escapeHtml(note.time)}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addSignature(e) {
            createRipple(e);
            
            const nameInput = document.getElementById('guestName');
            const msgInput = document.getElementById('guestMessage');
            
            const name = nameInput.value.trim();
            const message = msgInput.value.trim();

            if (!name || !message) {
                alert('Please fill in both fields to log your message!');
                return;
            }

            const localData = localStorage.getItem(STORAGE_KEY);
            const notes = localData ? JSON.parse(localData) : getFallbackNotes();

            const options = { hour: '2-digit', minute: '2-digit' };
            const timestamp = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + new Date().toLocaleTimeString('en-US', options);

            notes.unshift({ name, message, time: timestamp });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));

            nameInput.value = '';
            msgInput.value = '';
            
            loadSignatures();
        }

        function getFallbackNotes() {
            return [
                { name: 'Squad Leader', message: 'Wishing you the happiest of birthdays, Sujata! Keep crushing your benchmarks!', time: 'Jul 06 10:15 PM' },
                { name: 'CodePartner', message: 'May your loop indexes never overflow and your positive aura keep radiating bright!', time: 'Jul 06 09:30 PM' }
            ];
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        /* Absolute Memory Disconnect Routine and Route Forwarding Pipeline */
        function destructAndNavigate() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 0;
            canvas.height = 0;
            let id = window.setInterval(function() {}, 0);
            while (id--) { window.clearInterval(id); }
            window.location.replace("finale.html");
        }

        function proceedToFinale(e) {
            createRipple(e);
            setTimeout(destructAndNavigate, 400);
        }

        function createRipple(e) {
            const btn = e.currentTarget;
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;
            const rect = btn.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            btn.appendChild(circle);
        }

        // Run primary render loop layout compilation on window visibility context init
        loadSignatures();
    </script>
</body>
</html>
