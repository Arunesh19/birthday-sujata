<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujata's Birthday Guestbook ✍️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #03020b, #010104);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .guestbook-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .title-glow {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00e5ff, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Glassmorphic Live Typewriter Console Layout */
        .typing-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            margin-bottom: 30px;
            text-align: left;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
        }

        /* Console Dot Headers */
        .card-header-dots {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        .typing-text {
            font-size: 1.05rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.95);
            word-break: break-word;
            font-weight: 400;
        }

        /* Blinking Console Cursor Element */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1rem;
            background-color: #00e5ff;
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Core Global Action Layout Navigation Control */
        .action-btn {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: linear-gradient(45deg, #00e5ff, #2979ff);
            color: white;
            box-shadow: 0 12px 30px rgba(0, 229, 255, 0.25);
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
        }

        /* Triggered dynamically when typing completes */
        .action-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .action-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 229, 255, 0.45);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="guestbook-container">
        <h1 class="title-glow">Incoming Transmission</h1>
        <p class="subtitle">Decrypting birthday message records...</p>

        <div class="typing-card">
            <div class="card-header-dots">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <p class="typing-text"><span id="typewriter"></span><span class="cursor" id="cursor"></span></p>
        </div>

        <button class="action-btn" id="finaleBtn" onclick="proceedToFinale(event)">
            Proceed to Grand Finale →
        </button>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId = null;
        let isTabActive = true;
        let driftNodes = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class DriftNode {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 1.1 + 0.3;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.vy = -(Math.random() * 0.2 + 0.05);
            }
            update() {
                this.y += this.vy;
                if (this.y < -10) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#00e5ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < 30; i++) { driftNodes.push(new DriftNode()); }

        function runGuestbookEngine() {
            if (!isTabActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let node of driftNodes) {
                node.update();
                node.draw();
            }
            animationFrameId = requestAnimationFrame(runGuestbookEngine);
        }
        runGuestbookEngine();

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                isTabActive = true;
                runGuestbookEngine();
            }
        });

        /* Realtime Live Text Typing Machine Logic Routine */
        const messageText = "Wishing a fantastic birthday to one of the strongest people I know. May this next year bring you even closer to your biggest dreams. As life gets busier, I hope you always take the time to stay safe and ground yourself. You have so much potential, and I know this next year will be your most successful one yet. Keep shining!";
        
        let charIndex = 0;
        const typingSpeed = 35; // Adjust letter spacing delay speed execution in milliseconds here
        const typewriterElement = document.getElementById("typewriter");
        const finaleButton = document.getElementById("finaleBtn");
        const cursorElement = document.getElementById("cursor");

        function typeWriterEffect() {
            if (charIndex < messageText.length) {
                typewriterElement.innerHTML += messageText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriterEffect, typingSpeed);
            } else {
                // Remove blinking cursor and slide navigation control into place gracefully
                cursorElement.style.display = "none";
                finaleButton.classList.add("visible");
            }
        }

        /* Absolute Memory Disconnect Routine and Route Forwarding Pipeline */
        function destructAndNavigate() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 0; canvas.height = 0;
            window.location.replace("finale.html");
        }

        function proceedToFinale(e) {
            const btn = e.currentTarget;
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;
            const rect = btn.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            btn.appendChild(circle);

            setTimeout(destructAndNavigate, 400);
        }

        // Initialize live script runtime sequence
        window.onload = () => {
            setTimeout(typeWriterEffect, 600); // Tiny pause before starting execution
        };
    </script>
</body>
</html>
