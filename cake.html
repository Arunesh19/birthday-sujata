                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blow the Candles! 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #090514, #020105);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Ambient Sparkles Canvas Backdrop */
        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Intercept Overlay to bypass aggressive Browser Autoplay Policies */
        .interact-overlay {
            position: fixed;
            inset: 0;
            background: rgba(4, 2, 8, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
            text-align: center;
            padding: 20px;
        }

        .interact-overlay.hide {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        .envelope-btn {
            background: linear-gradient(45deg, #ffd54f, #ff4081);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 64, 129, 0.4);
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .envelope-btn:hover {
            transform: scale(1.05);
        }

        /* Modernized Glassmorphic Cake Display Panel */
        .cake-panel {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 440px;
            padding: 35px 25px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255,255,255,0.1);
            text-align: center;
            opacity: 0;
            transform: scale(0.95);
            animation: paneShow 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes paneShow {
            to { opacity: 1; transform: scale(1); }
        }

        .title-glow {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffe082, #ff4081, #b388ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .desc {
            font-size: 0.9rem;
            opacity: 0.7;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .cake-container {
            width: 240px;
            height: 310px;
            margin: 0 auto 30px;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        /* Luminous Floating Polaroid Picture Framing */
        .cake-photo-holder {
            position: absolute;
            width: 90px;
            height: 105px;
            bottom: 200px;
            background: linear-gradient(180deg, #ffffff, #f5f5f7);
            padding: 6px 6px 20px 6px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 25px rgba(255, 213, 79, 0.2);
            z-index: 25;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease;
            animation: gentleFloat 4s ease-in-out infinite alternate;
        }

        .cake-photo-holder img {
            width: 100%;
            height: 76px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0) rotate(-2deg); }
            100% { transform: translateY(-8px) rotate(2deg); }
        }

        .candle {
            width: 10px;
            height: 35px;
            background: linear-gradient(to top, #ffd54f, #ffb300);
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
            z-index: 20;
        }

        .flame {
            width: 14px;
            height: 22px;
            background: linear-gradient(to bottom, #ffeb3b, #ff5722);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #ff5722, 0 0 25px #ffeb3b;
            animation: flicker 0.6s infinite alternate ease-in-out;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(1deg); }
        }

        /* Structural Design Base Alignment for Cake Tiers */
        .layer {
            border-radius: 12px 12px 4px 4px;
            position: relative;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        .layer-top {
            width: 130px;
            height: 45px;
            background: linear-gradient(to right, #ff4081, #ff80ab, #ff4081);
            z-index: 5;
        }

        .layer-middle {
            width: 175px;
            height: 50px;
            background: linear-gradient(to right, #e91e63, #ff4081, #e91e63);
            z-index: 4;
            margin-top: -5px;
        }

        .layer-bottom {
            width: 220px;
            height: 55px;
            background: linear-gradient(to right, #c2185b, #e91e63, #c2185b);
            z-index: 3;
            margin-top: -5px;
        }

        .frosting-line {
            width: 102%;
            height: 10px;
            background: #ffffff;
            position: absolute;
            top: 10px;
            left: -1%;
            border-radius: 10px;
        }

        /* State Adjustments when Candle is Extinguished */
        .cake-container.extinguished .flame {
            opacity: 0;
            transform: translateX(-50%) scale(0);
            pointer-events: none;
        }

        .cake-container.extinguished .cake-photo-holder {
            animation: none;
            background: linear-gradient(180deg, #ffffff, #fff0f5);
            box-shadow: 0 20px 45px rgba(255, 64, 129, 0.4);
            transform: scale(1.05) rotate(0deg) translateY(-5px);
        }

        /* Action Controls Layout Adjustments */
        .action-btn {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff4081, #ff80ab);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(255, 64, 129, 0.3);
            transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
        }

        .action-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 16px 35px rgba(255, 64, 129, 0.5);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Overlay Prompt forcing immediate Interaction to trigger Audio Autoplay instantly -->
    <div class="interact-overlay" id="greetingOverlay">
        <h1 class="title-glow" style="font-size: 2.2rem;">You're Invited! ✨</h1>
        <p class="desc" style="max-width: 300px; margin-bottom: 20px;">Open Sujata's Birthday Celebration dashboard to play music and blow the candles.</p>
        <button class="envelope-btn" onclick="openCelebration()">Open Celebration Card 💌</button>
    </div>

    <audio id="birthdaySong" src="birthday.mp3" loop prefetch></audio>
    <canvas id="bgCanvas"></canvas>

    <div class="cake-panel">
        <h1 class="title-glow">Make a Wish, Sujata!</h1>
        <p class="desc">Tap directly on the 3-layer premium cake to extinguish the flame and initialize credentials...</p>
        
        <div class="cake-container" id="birthdayCake" onclick="extinguishFlame(event)">
            <!-- Polaroid Frame Floating Safely Above Top Frosting Layer Base -->
            <div class="cake-photo-holder">
                <img src="avatar.png" alt="Sujata" onerror="this.src='https://via.placeholder.com/150'">
            </div>
            <div class="candle">
                <div class="flame" id="candleFlame"></div>
            </div>
            <div class="layer layer-top"><div class="frosting-line"></div></div>
            <div class="layer layer-middle"><div class="frosting-line"></div></div>
            <div class="layer layer-bottom"><div class="frosting-line"></div></div>
        </div>

        <button class="action-btn" onclick="navigateCertificate(event)">Collect Official Certificate →</button>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('birthdaySong');
        let animationFrameId = null;
        let isTabActive = true;
        let ambientParticles = [];

        // Fades overlay context and initializes music playback instantly in a persistent loop
        function openCelebration() {
            document.getElementById('greetingOverlay').classList.add('hide');
            audio.play().catch(e => console.log("Audio contextual fallback triggered:", e));
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class SoftGlowNode {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = -(Math.random() * 0.4 + 0.1);
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.y += this.speedY;
                if(this.y < -10) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff80ab';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for(let i=0; i<30; i++) { ambientParticles.push(new SoftGlowNode()); }

        function runRenderEngine() {
            if (!isTabActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let p of ambientParticles) {
                p.update();
                p.draw();
            }
            animationFrameId = requestAnimationFrame(runRenderEngine);
        }
        runRenderEngine();

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                isTabActive = true;
                runRenderEngine();
            }
        });

        function destructAndNavigate() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            audio.pause();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 0; canvas.height = 0;
            window.location.replace("certificate.html");
        }

        // Extinguishes flame and completely silences the audio loop automatically
        function extinguishFlame(e) {
            const cake = document.getElementById('birthdayCake');
            if(cake.classList.contains('extinguished')) return;
            
            cake.classList.add('extinguished');
            
            // Instantly pause and reset audio tracks when candle drops flame states
            audio.pause();
            audio.currentTime = 0;
            
            const circle = document.createElement('span');
            const diameter = Math.max(cake.clientWidth, cake.clientHeight);
            const radius = diameter / 2;
            const rect = cake.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            cake.appendChild(circle);
        }

        function navigateCertificate(e) {
            const cake = document.getElementById('birthdayCake');
            
            if (!cake.classList.contains('extinguished')) {
                alert("Blow the candle first to proceed with next page");
                return;
            }

            const btn = e.currentTarget;
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;
            const rect = btn.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            btn.appendChild(circle);

            setTimeout(destructAndNavigate, 400);
        }
    </script>
</body>
</html>
