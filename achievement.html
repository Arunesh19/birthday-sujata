<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujata's Achievements 🏆</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #070710, #020204);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphism Master Panel Frame */
        .achievement-panel {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 460px;
            padding: 35px 25px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: panelFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes panelFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd54f, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        /* Achievements Metrics Layout Row Grid */
        .stat-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            text-align: left;
            transform: translateX(-20px);
            opacity: 0;
            animation: slideItem 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideItem {
            to { opacity: 1; transform: translateX(0); }
        }

        .stat-icon {
            font-size: 2rem;
            margin-right: 15px;
            filter: drop-shadow(0 0 8px rgba(255,213,79,0.3));
        }

        .stat-details h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
        }

        .stat-details p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }

        /* iOS Next Trigger Command Styling */
        .action-button {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff4081, #ff80ab);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 64, 129, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .action-button:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(255, 64, 129, 0.5);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="achievement-panel">
        <h1 class="header-title">Milestones Unlocked</h1>
        
        <div class="stat-grid">
            <div class="stat-card" style="animation-delay: 0.2s;">
                <div class="stat-icon">✨</div>
                <div class="stat-details">
                    <h3>Elite Style Tier</h3>
                    <p>Consistently out-dressing the metrics loop.</p>
                </div>
            </div>
            <div class="stat-card" style="animation-delay: 0.4s;">
                <div class="stat-icon">⚡</div>
                <div class="stat-details">
                    <h3>Witty Comeback Level 99</h3>
                    <p>Zero cooldown response timing achieved.</p>
                </div>
            </div>
            <div class="stat-card" style="animation-delay: 0.6s;">
                <div class="stat-icon">👑</div>
                <div class="stat-details">
                    <h3>Supreme Aura Status</h3>
                    <p>Unmatched charismatic radiation footprint.</p>
                </div>
            </div>
        </div>

        <button class="action-button" onclick="proceedToCake(event)">Proceed to Celebration →</button>
    </div>

    <script>
        /* Context Variable Hooks & Anti-Lag Pointer Storage Arrays */
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId = null;
        let isTabActive = true;
        let ambientParticles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        /* Premium Floating Dust Element Blueprints */
        class LuxurySparkle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height + canvas.height;
                this.radius = Math.random() * 1.5 + 0.5;
                this.speedY = -(Math.random() * 0.5 + 0.2);
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speedY;
                if(this.y < -10) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ffd54f';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for(let i=0; i<35; i++) {
            ambientParticles.push(new LuxurySparkle());
        }

        /* Tab Performance Conscious Engine Render Core Loop */
        function renderLoop() {
            if (!isTabActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let p of ambientParticles) {
                p.update();
                p.draw();
            }
            animationFrameId = requestAnimationFrame(renderLoop);
        }
        renderLoop();

        /* Visibility Change Interceptor Action Listeners */
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                isTabActive = true;
                renderLoop();
            }
        });

        /* Absolute Memory Disconnect Sequence Trigger */
        function clearAndNavigate() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 0;
            canvas.height = 0;

            let id = window.setInterval(function() {}, 0);
            while (id--) { window.clearInterval(id); }

            window.location.replace("cake.html");
        }

        /* Interface Action Handler Functionality */
        function proceedToCake(e) {
            const btn = e.currentTarget;
            
            // Build interactive button ripple
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;
            const rect = btn.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            btn.appendChild(circle);

            // Execute clean redirect right as ripple completes scaling outward
            setTimeout(clearAndNavigate, 400);
        }
    </script>
</body>
</html>
