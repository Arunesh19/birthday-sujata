<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Finale ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #020107, #050212);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphic Presentation Wrapper Frame */
        .finale-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 50px 30px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
            text-align: center;
            opacity: 0;
            transform: scale(0.95);
            animation: paneShow 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes paneShow {
            to { opacity: 1; transform: scale(1); }
        }

        /* Premium Visual Iconography */
        .crown-badge {
            font-size: 3rem;
            margin-bottom: 24px;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(255, 213, 79, 0.6));
            animation: float 3s ease-in-out infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        .title-glow {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd54f, #ff4081, #00e5ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            animation: dynamicGlow 4s linear infinite;
        }

        @keyframes dynamicGlow {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        .final-desc {
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        /* Interactive Vector Restart Button */
        .action-btn {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(45deg, #2979ff, #00e5ff);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(0, 229, 255, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 35px rgba(0, 229, 255, 0.45);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Lightweight Interactive Fireworks Layer -->
    <canvas id="bgCanvas"></canvas>

    <div class="finale-panel">
        <div class="crown-badge">👑</div>
        <h1 class="title-glow">Cheers to Sujata!</h1>
        <p class="final-desc">
            All verification modules have successfully finished running. May your upcoming year be packed with incredible ventures, deep happiness, and massive success!
        </p>

        <button class="action-btn" onclick="restartExperience(event)">Restart Experience 🔄</button>
    </div>

    <script>
        /* Anti-Leak Thread State Pointer Configurations */
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId = null;
        let isTabActive = true;
        let activeExplosions = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        /* High-Performance Particle Constructor */
        class SparkNode {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 4 + 1;
                this.friction = 0.95;
                this.gravity = 0.07;
                this.hue = hue;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function launchFirework() {
            if (!isTabActive) return;
            const targetX = Math.random() * canvas.width;
            const targetY = Math.random() * (canvas.height * 0.5) + canvas.height * 0.15;
            const selectedHue = Math.random() * 360;
            
            for (let i = 0; i < 40; i++) {
                activeExplosions.push(new SparkNode(targetX, targetY, selectedHue));
            }
        }

        // Periodically schedule safe firework bursts
        let fireworkTimer = setInterval(launchFirework, 800);

        /* Throttling-Insulated Core Animation Render Engine Loop */
        function runFinaleEngine() {
            if (!isTabActive) return;
            ctx.fillStyle = 'rgba(2, 1, 7, 0.2)'; // Smooth trailing artifact blend
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = activeExplosions.length - 1; i >= 0; i--) {
                const spark = activeExplosions[i];
                spark.update();
                if (spark.alpha <= 0) {
                    activeExplosions.splice(i, 1);
                } else {
                    spark.draw();
                }
            }
            animationFrameId = requestAnimationFrame(runFinaleEngine);
        }
        runFinaleEngine();

        /* Window Tab Focus Observer Hooks */
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
                clearInterval(fireworkTimer);
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                isTabActive = true;
                fireworkTimer = setInterval(launchFirework, 800);
                runFinaleEngine();
            }
        });

        /* Absolute Memory Disconnect Routine and Return Loop */
        function destructAndNavigate() {
            clearInterval(fireworkTimer);
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 0;
            canvas.height = 0;

            let id = window.setInterval(function() {}, 0);
            while (id--) { window.clearInterval(id); }

            // Route back to page 1 (message.html)
            window.location.replace("message.html");
        }

        /* Tap Event Action Processor */
        function restartExperience(e) {
            const btn = e.currentTarget;
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;
            const rect = btn.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            btn.appendChild(circle);

            setTimeout(destructAndNavigate, 400);
        }
    </script>
</body>
</html>
