<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Premium Mystery Box 🎁</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a14, #020205);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            perspective: 1000px;
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphic Presentation Card Layout */
        .gift-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            text-align: center;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardReveal {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .title-glow {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd54f, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .instruction {
            font-size: 0.95rem;
            opacity: 0.75;
            margin-bottom: 35px;
            transition: opacity 0.4s ease;
        }

        /* Interactive Vector Gift Box Structure */
        .gift-box-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gift-box-container:hover {
            transform: scale(1.08) rotate(3deg);
        }

        .gift-box-container:active {
            transform: scale(0.95);
        }

        .gift-lid {
            width: 150px;
            height: 35px;
            background: linear-gradient(45deg, #ff4081, #ff80ab);
            border-radius: 6px;
            position: absolute;
            top: 0;
            left: -5px;
            z-index: 3;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }

        .gift-body {
            width: 140px;
            height: 110px;
            background: linear-gradient(45deg, #e91e63, #c2185b);
            border-radius: 0 0 12px 12px;
            position: absolute;
            bottom: 0;
            z-index: 2;
            box-shadow: 0 15px 35px rgba(233, 30, 99, 0.3);
            overflow: hidden;
            transition: transform 0.6s ease;
        }

        /* Ribbon Decoration Overlays */
        .ribbon-vertical {
            width: 26px;
            height: 100%;
            background: linear-gradient(to bottom, #ffd54f, #ffb300);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
        }

        /* Box Open Animation State Changes */
        .gift-box-container.open .gift-lid {
            transform: translateY(-60px) rotate(-25deg) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        /* Revealed Message Typography Panel */
        .gift-reveal-msg {
            max-height: 0;
            opacity: 0;
            transform: scale(0.9);
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.5;
            color: #ffd54f;
            text-shadow: 0 0 15px rgba(255, 213, 79, 0.4);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 0 10px;
        }

        .gift-reveal-msg.show {
            max-height: 100px;
            opacity: 1;
            transform: scale(1);
            margin: 20px 0 30px;
        }

        /* Navigation Forward Flow Buttons */
        .action-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(45deg, #ff4081, #ff80ab);
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 64, 129, 0.25);
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .action-btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .action-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 30px rgba(255, 64, 129, 0.45);
        }

        /* Action Response System */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="gift-wrapper">
        <h1 class="title-glow">A Box for Sujata</h1>
        <p class="instruction" id="boxHint">Tap the premium mystery box to uncover what lies within the next tracking channel...</p>
        
        <div class="gift-box-container" id="mysteryBox" onclick="openGiftSequence(event)">
            <div class="gift-lid"><div class="ribbon-vertical" style="height:35px;"></div></div>
            <div class="gift-body"><div class="ribbon-vertical"></div></div>
        </div>

        <div class="gift-reveal-msg" id="revealMessage">
            Receive your gift on Tuesday,<br>it's awaiting for you. ✨
        </div>

        <button class="action-btn" id="continueBtn" onclick="destructAndNavigate(event)">
            Continue Journey →
        </button>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId = null;
        let isTabActive = true;
        let sparkles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Sparkle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 1.3 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff80ab';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for(let i=0; i<35; i++) { sparkles.push(new Sparkle()); }

        function renderLoop() {
            if (!isTabActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let s of sparkles) {
                s.update();
                s.draw();
            }
            animationFrameId = requestAnimationFrame(renderLoop);
        }
        renderLoop();

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                isTabActive = true;
                renderLoop();
            }
        });

        function destructAndNavigate(e) {
            if(e && e.currentTarget) {
                const btn = e.currentTarget;
                const circle = document.createElement('span');
                const diameter = Math.max(btn.clientWidth, btn.clientHeight);
                const radius = diameter / 2;
                const rect = btn.getBoundingClientRect();
                circle.style.width = circle.style.height = `${diameter}px`;
                circle.style.left = `${e.clientX - rect.left - radius}px`;
                circle.style.top = `${e.clientY - rect.top - radius}px`;
                circle.classList.add('ripple');
                btn.appendChild(circle);
            }

            setTimeout(() => {
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                canvas.width = 0; canvas.height = 0;
                
                let id = window.setInterval(function() {}, 0);
                while (id--) { window.clearInterval(id); }

                window.location.replace("tunnel.html");
            }, 300);
        }

        function openGiftSequence(e) {
            const box = document.getElementById('mysteryBox');
            if(box.classList.contains('open')) return; 
            
            box.classList.add('open');

            // Ripple Feedback
            const circle = document.createElement('span');
            const diameter = Math.max(box.clientWidth, box.clientHeight);
            const radius = diameter / 2;
            const rect = box.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            box.appendChild(circle);

            // Hide old sub-hints and reveal the hidden text/action elements cleanly
            document.getElementById('boxHint').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('revealMessage').classList.add('show');
                document.getElementById('continueBtn').classList.add('show');
            }, 400);
        }
    </script>
</body>
</html>
