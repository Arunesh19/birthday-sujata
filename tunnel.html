<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Tunnel 🌌</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #020206;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #tunnelCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphic Progression Display Shield */
        .tunnel-card {
            position: relative;
            z-index: 10;
            width: 85%;
            max-width: 450px;
            padding: 35px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .status-header {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ff4081;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        /* Continuous text element presentation structures */
        .message-node {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            margin-bottom: 10px;
        }

        .message-node.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modernized iOS style tracking bar loader */
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4081, #ffd54f);
            border-radius: 10px;
            transition: width 9.5s linear; /* Matches first narrative timeline precisely */
        }
    </style>
</head>
<body>

    <canvas id="tunnelCanvas"></canvas>

    <div class="tunnel-card">
        <div class="status-header">Syncing Channels</div>
        
        <div class="message-node" id="msg1">Streaming historic timelines...</div>
        <div class="message-node" id="msg2" style="color: #ffd54f;">Compiling celebration achievements...</div>
        
        <div class="progress-track">
            <div class="progress-bar" id="loaderBar"></div>
        </div>
    </div>

    <script>
        /* Thread Control Arrays and Context Configurations */
        const canvas = document.getElementById('tunnelCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId = null;
        let isTabActive = true;
        let starNodes = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        /* High-Velocity Tunnel Star Vectors */
        class TunnelStar {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = (Math.random() - 0.5) * canvas.width;
                this.y = (Math.random() - 0.5) * canvas.height;
                this.z = Math.random() * canvas.width; // Radial projection depth index
                this.size = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.z -= 4; // Velocity rate towards user
                if (this.z <= 0) this.reset();
            }
            draw() {
                // Map the 3D space vectors into flat 2D viewport coordinates
                const k = 128 / this.z;
                const px = this.x * k + canvas.width / 2;
                const py = this.y * k + canvas.height / 2;

                if (px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
                    const sizeFraction = (1 - this.z / canvas.width) * this.size * 2;
                    ctx.save();
                    ctx.globalAlpha = 1 - this.z / canvas.width;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(px, py, sizeFraction, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                } else {
                    this.reset();
                }
            }
        }

        for (let i = 0; i < 65; i++) {
            starNodes.push(new TunnelStar());
        }

        /* Background-Optimized Tunnel Simulation Render Loop */
        function renderTunnel() {
            if (!isTabActive) return;
            ctx.fillStyle = 'rgba(2, 2, 6, 0.25)'; // Smooth motion blur trail
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let star of starNodes) {
                star.update();
                star.draw();
            }
            animationFrameId = requestAnimationFrame(renderTunnel);
        }
        renderTunnel();

        /* Tab Sleeping Listeners */
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                isTabActive = true;
                renderTunnel();
            }
        });

        /* Absolute Cleanup and Progression Router */
        function clearAndNavigate() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 0;
            canvas.height = 0;

            let id = window.setInterval(function() {}, 0);
            while (id--) { window.clearInterval(id); }

            window.location.replace("achievement.html");
        }

        /* Chained Non-Overlapping Linear Sequence Execution */
        window.onload = () => {
            const m1 = document.getElementById('msg1');
            const m2 = document.getElementById('msg2');
            const bar = document.getElementById('loaderBar');

            // 1. Kickstart initial UI animations and load sequence loader immediately
            setTimeout(() => {
                m1.classList.add('show');
                if (bar) bar.style.width = '100%';
            }, 200);

            // 2. Safely introduce second sequence step without competing loops
            setTimeout(() => {
                m1.classList.remove('show');
                setTimeout(() => {
                    m2.classList.add('show');
                }, 400); // Small visual stagger padding for crossfade feel
            }, 5500);

            // 3. Chain destination terminal routing step exactly when the loader hits full width
            setTimeout(() => {
                clearAndNavigate();
            }, 9700);
        };
    </script>
</body>
</html>
