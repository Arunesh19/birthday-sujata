<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Surprise Hub ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #06060c, #020204);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphic Landing Card */
        .welcome-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        .title-glow {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd54f, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        /* Form Group Styles */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffd54f;
            opacity: 0.9;
            padding-left: 4px;
        }

        .input-field {
            width: 100%;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #ff4081;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(255, 64, 129, 0.2);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .error-message {
            color: #ff5252;
            font-size: 0.85rem;
            margin-top: -10px;
            margin-bottom: 15px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Premium iOS Trigger Button */
        .enter-btn {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff4081, #ff80ab);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(255, 64, 129, 0.3);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
            margin-top: 10px;
        }

        .enter-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 18px 40px rgba(255, 64, 129, 0.5);
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="welcome-card">
        <h1 class="title-glow">Sujata's Surprise</h1>
        <p class="subtitle">Enter credentials to unlock the gateway</p>
        
        <form id="loginForm" onsubmit="handleVerification(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="input-field" placeholder="Enter your name" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="password">Special Date</label>
                <input type="text" id="password" class="input-field" placeholder="DD/MM" autocomplete="off" required>
            </div>

            <div id="errorDisplay" class="error-message">Incorrect password or identity frame.</div>

            <button type="submit" class="enter-btn">Verify & Enter Gateway →</button>
        </form>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId = null;
        let isTabActive = true;
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class MagicSpark {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height + canvas.height;
                this.size = Math.random() * 1.8 + 0.5;
                this.speedY = -(Math.random() * 0.8 + 0.3);
                this.alpha = Math.random() * 0.6 + 0.2;
            }
            update() {
                this.y += this.speedY;
                if (this.y < -10) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for(let i = 0; i < 40; i++) {
            particles.push(new MagicSpark());
        }

        function render() {
            if (!isTabActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let p of particles) {
                p.update();
                p.draw();
            }
            animationFrameId = requestAnimationFrame(render);
        }
        render();

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                isTabActive = true;
                render();
            }
        });

        /* Identity Verification Engine */
        function handleVerification(e) {
            e.preventDefault();
            
            const userInp = document.getElementById('username').value.trim().toLowerCase();
            const passInp = document.getElementById('password').value.trim();
            const errorDisplay = document.getElementById('errorDisplay');

            // Case insensitive validations for the variants: "sujata" or "sujata jha"
            const isUserValid = (userInp === "sujata" || userInp === "sujata jha");
            const isPassValid = (passInp === "13/07");

            if (isUserValid && isPassValid) {
                errorDisplay.style.opacity = "0";
                
                // Add aesthetic premium ripple trigger animation to the submit button
                const btn = e.target.querySelector('.enter-btn');
                const circle = document.createElement('span');
                const diameter = Math.max(btn.clientWidth, btn.clientHeight);
                const radius = diameter / 2;
                
                circle.style.width = circle.style.height = `${diameter}px`;
                circle.style.left = `${btn.clientWidth / 2 - radius}px`;
                circle.style.top = `${btn.clientHeight / 2 - radius}px`;
                circle.classList.add('ripple');
                btn.appendChild(circle);

                setTimeout(executeCleanupAndNavigate, 400);
            } else {
                errorDisplay.style.opacity = "1";
                if(!isUserValid && isPassValid) {
                    errorDisplay.innerText = "Identity unrecognized. Access denied.";
                } else if(isUserValid && !isPassValid) {
                    errorDisplay.innerText = "Incorrect special date framework.";
                } else {
                    errorDisplay.innerText = "Invalid credentials. Please try again.";
                }
            }
        }

        function executeCleanupAndNavigate() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 0;
            canvas.height = 0;

            // Route user smoothly over into the gift.html context
            window.location.replace("gift.html");
        }
    </script>
</body>
</html>
