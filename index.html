<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Surprise Hub ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #06060c, #020204);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphic Landing Card */
        .welcome-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        .title-glow {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd54f, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* Countdown Visual Counter */
        .counter-box {
            font-size: 4rem;
            font-weight: 700;
            color: #ffd54f;
            text-shadow: 0 0 20px rgba(255,213,79,0.4);
            margin-bottom: 30px;
            animation: pulseScale 1s infinite alternate ease-in-out;
        }

        @keyframes pulseScale {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Premium iOS Trigger Button */
        .enter-btn {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff4081, #ff80ab);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(255, 64, 129, 0.3);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
        }

        .enter-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 18px 40px rgba(255, 64, 129, 0.5);
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="welcome-card">
        <h1 class="title-glow">Sujata's Surprise</h1>
        <p class="subtitle">Initializing secure celebration gateway sequence...</p>
        
        <div class="counter-box" id="countdownDisplay">5</div>

        <button class="enter-btn" onclick="gateRedirect(event)">Enter Gateway Now →</button>
    </div>

    <script>
        /* Anti-Throttling Context Variables & Pointers */
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId = null;
        let countdownIntervalId = null;
        let isTabActive = true;
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        /* Performance Optimized Particle Blueprints */
        class MagicSpark {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height + canvas.height;
                this.size = Math.random() * 1.8 + 0.5;
                this.speedY = -(Math.random() * 0.8 + 0.3);
                this.alpha = Math.random() * 0.6 + 0.2;
            }
            update() {
                this.y += this.speedY;
                if (this.y < -10) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Initialize constrained particle count to optimize processing memory footprint
        for(let i = 0; i < 40; i++) {
            particles.push(new MagicSpark());
        }

        /* Safe Background-Aware Render Loop Engine */
        function render() {
            if (!isTabActive) return; // Prevent render pileups when tab sleeping
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let p of particles) {
                p.update();
                p.draw();
            }
            animationFrameId = requestAnimationFrame(render);
        }
        render();

        /* Browser Tab State Interceptor Monitoring */
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                isTabActive = true;
                render();
            }
        });

        /* Clean Automated Countdown System Handler */
        let remainingTime = 5;
        const display = document.getElementById('countdownDisplay');

        countdownIntervalId = setInterval(() => {
            remainingTime--;
            if (display) display.innerText = remainingTime;

            if (remainingTime <= 0) {
                executeCleanupAndNavigate();
            }
        }, 1000);

        /* Absolute Thread Cleanup Routine (The Core Bug Fix) */
        function executeCleanupAndNavigate() {
            // 1. Immediately break timer threads out of memory scope
            if (countdownIntervalId) clearInterval(countdownIntervalId);
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            // 2. Clear canvas data to free memory arrays
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 0;
            canvas.height = 0;

            // 3. Clear any global remaining intervals across window context
            let id = window.setInterval(function() {}, 0);
            while (id--) { window.clearInterval(id); }

            // 4. Force state-replaced history redirection frame transition
            window.location.replace("gift.html");
        }

        /* Direct Interaction Handler with Embedded Ripple Mechanics */
        function gateRedirect(e) {
            const btn = e.currentTarget;
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;
            const rect = btn.getBoundingClientRect();

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            btn.appendChild(circle);

            // Navigate right after ripple finishes scaling out gracefully
            setTimeout(executeCleanupAndNavigate, 400);
        }
    </script>
</body>
</html>
